<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="Style.css">
</head>
<style>
  body{
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.form-container{
  flex: 1;
}
</style>
<body class="bg-login">
      <header id="navbar" class="fixed top-0 w-full z-50 backdrop-blur-md bg-white/80 border-b border-gray-200 transition-all duration-300">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- LOGO -->
    <div class="flex items-center gap-2">
      <img src="images/Logo.png" class="h-9 w-9">
      <span class="font-bold text-xl text-gray-800">FeedMall</span>
    </div>

    <!-- DESKTOP MENU -->
    <div class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="nav-link">Home</a>
      <a href="menu.html" class="nav-link">Menu</a>
      <a href="checkout.html" class="nav-link">Checkout</a>
      <a href="about.html" class="nav-link">About</a>

      <!-- Cart icon -->
      <a href="checkout.html" class="relative">
        🛒
        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1 rounded-full">
          0
        </span>
      </a>

      <a href="login.html" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
        Login
      </a>
    </div>

    <button id="burgerBtn" class="lg:hidden flex flex-col gap-1">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </nav>

  <!-- OVERLAY -->
  <div id="overlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden"></div>

  <!-- MOBILE SIDEBAR -->
  <div id="mobileMenu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-xl transform translate-x-full transition duration-300">
    <div class="flex justify-between items-center p-6 border-b">
      <span class="font-bold text-gray-800">Menu</span>
      <button id="closeBtn" class="text-2xl">✕</button>
    </div>

    <div class="flex flex-col gap-6 p-6 bg-black text-white">
      <a class="hover:bg-gray-500 px-5 py-2" href="index.html">Home</a>
      <a class="hover:bg-gray-500 px-5 py-2" href="menu.html">Menu</a>
      <a class="hover:bg-gray-500 px-5 py-2" href="checkout.html">Checkout</a>
      <a class="hover:bg-gray-500 px-5 py-2" href="about.html">About</a>
      <a href="login.html" class="bg-red-600 text-white text-center py-2 hover:bg-red-500 rounded-full">Login</a>
    </div>
  </div>
</header>

   <div class="form-container max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-lg">
  <h2 class="text-2xl font-bold text-center mb-6">Welcome Back</h2>

  <!-- Toggle Buttons -->
  <div class="flex justify-center gap-4 mb-6">
    <button id="signInBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Sign In</button>
    <button id="signUpBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300">Sign Up</button>
  </div>

  <!-- Sign In Form -->
  <form id="signInForm" class="form flex flex-col gap-4">
    <input type="email" placeholder="Email" required class="border px-3 py-2 rounded">

    <div class="relative w-full">
      <input type="password" id="signInPassword" placeholder="Password" required class="border px-3 py-2 rounded w-full pr-12">
      
       <!-- Eye icon inside input -->
    <span id="toggleSignInPassword"
        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 cursor-pointer text-2xl">
          👁
    </span>
    </div>

    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Sign In</button>
  </form>

  <!-- Sign Up Form -->
  <form id="signUpForm" class="form flex-col gap-4 hidden">
    <input type="text" placeholder="Full Name" required class="border px-3 py-2 rounded">
    <input type="email" placeholder="Email" required class="border px-3 py-2 rounded">

    <div class="relative w-full">
      <input type="password" id="signUpPassword" placeholder="Password" required class="border px-3 py-2 rounded w-full pr-12">
      
       <!-- Eye icon inside input -->
    <span id="toggleSignUpPassword"
        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 cursor-pointer text-2xl">
          👁
    </span>
    </div>

    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Sign Up</button>
  </form>
</div>

<footer class="bg-gray-900 text-white text-center py-6 mt-16">
  <p class="text-sm">© 2026 FeedMall Restaurant</p>
  <div class="flex justify-center gap-6 mt-2 text-sm">
    <a href="menu.html" class="hover:text-red-400">Menu</a>
    <a href="about.html" class="hover:text-red-400">About</a>
    <a href="checkout.html" class="hover:text-red-400">Checkout</a>
  </div>
</footer>

<script>
  // Toggle between Sign In / Sign Up
  const signInBtn = document.getElementById("signInBtn");
  const signUpBtn = document.getElementById("signUpBtn");
  const signInForm = document.getElementById("signInForm");
  const signUpForm = document.getElementById("signUpForm");

  signInBtn.addEventListener("click", () => {
    signInForm.classList.remove("hidden");
    signUpForm.classList.add("hidden");
    signInBtn.classList.add("bg-red-600", "text-white");
    signInBtn.classList.remove("bg-gray-200", "text-gray-800");
    signUpBtn.classList.add("bg-gray-200", "text-gray-800");
    signUpBtn.classList.remove("bg-red-600", "text-white");
  });

  signUpBtn.addEventListener("click", () => {
    signUpForm.classList.remove("hidden");
    signInForm.classList.add("hidden");
    signUpBtn.classList.add("bg-red-600", "text-white");
    signUpBtn.classList.remove("bg-gray-200", "text-gray-800");
    signInBtn.classList.add("bg-gray-200", "text-gray-800");
    signInBtn.classList.remove("bg-red-600", "text-white");
  });

  // Show/hide password
  // Sign In
const signInPassword = document.getElementById("signInPassword");
const toggleSignInPassword = document.getElementById("toggleSignInPassword");
toggleSignInPassword.addEventListener("click", () => {
  if (signInPassword.type === "password") {
    signInPassword.type = "text";
    toggleSignInPassword.textContent = "🙈";
  } else {
    signInPassword.type = "password";
    toggleSignInPassword.textContent = "👁";
  }
});

// Sign Up
const signUpPassword = document.getElementById("signUpPassword");
const toggleSignUpPassword = document.getElementById("toggleSignUpPassword");
toggleSignUpPassword.addEventListener("click", () => {
  if (signUpPassword.type === "password") {
    signUpPassword.type = "text";
    toggleSignUpPassword.textContent = "🙈";
  } else {
    signUpPassword.type = "password";
    toggleSignUpPassword.textContent = "👁";
  }
});
</script>

<script src="app.js"></script>
</body>
</html>
